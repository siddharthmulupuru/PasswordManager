<!DOCTYPE html>
<html>
<head>
  <title>Vault</title>
  <script src="api.js"></script>
  <style>
    :root {
      --bg-color: #0f172a; /* Dark slate blue */
      --surface-color: #1e1b4b; /* Very dark purple */
      --surface-hover: #2e1065;
      --text-primary: #f8fafc;
      --text-secondary: #c4b5fd;
      --accent-primary: #8b5cf6; /* Vibrant purple */
      --accent-hover: #7c3aed;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #10b981;
      --border-color: rgba(139, 92, 246, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background: linear-gradient(135deg, var(--bg-color), #09090b);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2rem;
      background-color: rgba(30, 27, 75, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
    }

    .nav-actions {
      display: flex;
      gap: 1rem;
    }

    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .icon-btn:hover {
      background-color: var(--surface-hover);
      color: #fff;
    }

    /* Inputs and Buttons */
    .input-field {
      width: 100%;
      padding: 0.8rem 1rem;
      background-color: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1rem;
      transition: all 0.2s;
      outline: none;
    }

    .input-field:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.3);
    }

    .btn {
      padding: 0.8rem 1.25rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: linear-gradient(to right, var(--accent-primary), #6d28d9);
      color: #ffffff;
    }

    .btn-primary:hover {
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.5);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background: var(--surface-hover);
      color: #fff;
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .btn-danger:hover {
      background: var(--danger-hover);
      box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
    }

    /* Main Area */
    .vault-container {
      flex: 1;
      padding: 2.5rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .vault-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .search-bar {
      position: relative;
      flex: 1;
      max-width: 500px;
    }

    .search-bar svg {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
    }

    .search-bar input {
      padding-left: 2.8rem;
    }

    /* Cards Grid */
    .vault-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    .entry-card {
      background: rgba(30, 27, 75, 0.5);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.5rem;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeIn 0.4s ease-out;
      display: flex;
      flex-direction: column;
    }

    .entry-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      background: rgba(30, 27, 75, 0.8);
    }

    .entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      border-bottom: 1px solid rgba(139, 92, 246, 0.1);
      padding-bottom: 0.75rem;
    }

    .entry-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #fff;
    }

    .entry-actions {
      display: flex;
      gap: 0.25rem;
    }

    .entry-detail {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .password-wrap {
      display: flex;
      align-items: center;
      background: rgba(15, 23, 42, 0.5);
      padding: 0.5rem;
      border-radius: 6px;
      border: 1px solid rgba(139, 92, 246, 0.2);
      margin-top: auto;
    }

    .password-wrap input {
      background: transparent;
      border: none;
      color: var(--text-primary);
      width: 100%;
      font-family: monospace;
      font-size: 1rem;
      outline: none;
    }

    .password-wrap button {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0.2rem;
    }

    .entry-desc {
      font-size: 0.875rem;
      color: rgba(196, 181, 253, 0.7);
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    /* Modals */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-container {
      background: #1e1b4b;
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 450px;
      transform: scale(0.95);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
    }

    .modal-overlay.active .modal-container {
      transform: scale(1);
    }

    .input-group {
      margin-bottom: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .input-group label {
      font-size: 0.875rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .password-generator-row {
      display: flex;
      gap: 0.5rem;
    }

    .modal-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    
    .modal-actions .btn {
      flex: 1;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-brand">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
      Vault
    </div>
    <div class="nav-actions">
      <button id="accountBtn" class="icon-btn" title="Account Settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="7" r="4"></circle>
          <path d="M5.5 21a8.38 8.38 0 0 1 13 0"></path>
        </svg>
      </button>
      <button id="logoutBtn" class="icon-btn" title="Logout">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="vault-container">
    <div class="vault-header">
      <div class="search-bar">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="searchInput" class="input-field" placeholder="Search entries...">
      </div>
      <button id="addEntryBtn" class="btn btn-primary" style="width: auto;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Add Entry
      </button>
    </div>

    <div id="vaultList" class="vault-grid"></div>
  </main>

  <!-- ================= MODALS ================= -->

  <!-- Add/Edit Entry Modal -->
  <div id="editModal" class="modal-overlay">
    <div class="modal-container">
      <h2 id="modalTitle" style="margin-bottom: 1.5rem; color: #fff;">Edit Entry</h2>
      
      <div class="input-group">
        <label for="editName">Name</label>
        <input type="text" id="editName" class="input-field" placeholder="e.g. My Bank">
      </div>
      
      <div class="input-group">
        <label for="editWebsite">Website</label>
        <input type="text" id="editWebsite" class="input-field" placeholder="https://">
      </div>
      
      <div class="input-group">
        <label for="editUsername">Username</label>
        <input type="text" id="editUsername" class="input-field" placeholder="Username / Email">
      </div>
      
      <div class="input-group">
        <label for="editPassword">Password</label>
        <div class="password-generator-row">
          <input type="password" id="editPassword" class="input-field" placeholder="Password">
          <button type="button" id="generatePasswordBtn" class="btn-secondary" style="padding: 0 1rem; border-radius: 8px;" title="Generate">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
            </svg>
          </button>
        </div>
      </div>
      
      <div class="input-group">
        <label for="editDescription">Description</label>
        <textarea id="editDescription" class="input-field" rows="3" placeholder="Notes..."></textarea>
      </div>

      <div class="modal-actions">
        <button id="cancelButton" class="btn btn-secondary">Cancel</button>
        <button id="saveButton" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div id="deleteModal" class="modal-overlay">
    <div class="modal-container" style="text-align: center; max-width: 400px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem;">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
        <line x1="12" y1="9" x2="12" y2="13"></line>
        <line x1="12" y1="17" x2="12.01" y2="17"></line>
      </svg>
      <h2 style="color: #fff; margin-bottom: 0.5rem;">Delete Entry</h2>
      <p style="color: var(--text-secondary); margin-bottom: 2rem;">Are you sure you want to permanently delete this entry? This action cannot be undone.</p>
      
      <div class="modal-actions">
        <button id="cancelDeleteBtn" class="btn btn-secondary">Keep It</button>
        <button id="confirmDeleteBtn" class="btn btn-danger">Yes, Delete</button>
      </div>
    </div>
  </div>

  <!-- Account Modal -->
  <div id="accountModal" class="modal-overlay">
    <div class="modal-container">
      <h2 style="color: #fff; margin-bottom: 1.5rem;">Account Settings</h2>
      <p style="color: var(--text-secondary); text-align: center; margin-bottom: 1.5rem;">Update your master password.</p>
      
      <div class="input-group">
        <label>Current Password</label>
        <input type="password" id="acctCurrent" class="input-field" placeholder="Current">
      </div>
      <div class="input-group">
        <label>New Password</label>
        <input type="password" id="acctNew" class="input-field" placeholder="New">
      </div>
      <div class="input-group">
        <label>Confirm Password</label>
        <input type="password" id="acctConfirm" class="input-field" placeholder="Confirm">
      </div>
      
      <div class="modal-actions">
        <button id="cancelAccountBtn" class="btn btn-secondary">Cancel</button>
        <button id="saveAccountBtn" class="btn btn-primary">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Script -->
  <script>
    let globalVaultEntries = [];
    let currentEditId = null;
    let entryToDelete = null;

    // Existing initialization behavior
    window.onload = async function () {
      if (sessionStorage.getItem("token") === null) {
        window.location.href = "/index.html"
        return;
      }

      // Keep original API logic!
      const vaultEntries = await getVaultEntries();
      globalVaultEntries = vaultEntries;

      renderGrid();
    };

    function renderGrid() {
      const vaultList = document.getElementById("vaultList");
      vaultList.innerHTML = '';
      
      const query = document.getElementById("searchInput").value.toLowerCase();

      globalVaultEntries.forEach((element, index) => {
        // Filter functionality
        if (query && !element.encryptedName.toLowerCase().includes(query) && 
            !element.encryptedWebsite.toLowerCase().includes(query)) {
          return;
        }

        const card = document.createElement("div");
        card.className = "entry-card";

        const headerRow = document.createElement("div");
        headerRow.className = "entry-header";
        
        const titleText = document.createElement("div");
        titleText.className = "entry-title";
        titleText.textContent = element.encryptedName;
        headerRow.appendChild(titleText);

        const actionsDiv = document.createElement("div");
        actionsDiv.className = "entry-actions";
        
        const editBtn = document.createElement("button");
        editBtn.className = "icon-btn";
        editBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`;
        
        editBtn.onclick = function() {
          document.getElementById("modalTitle").textContent = "Edit Entry";
          document.getElementById("editName").value = element.encryptedName;
          document.getElementById("editWebsite").value = element.encryptedWebsite;
          document.getElementById("editUsername").value = element.encryptedWebsiteUsername;
          document.getElementById("editPassword").value = element.encryptedWebsitePassword;
          document.getElementById("editDescription").value = element.encryptedDescription || '';
          currentEditId = element.id;
          document.getElementById("editModal").classList.add("active");
        };

        const delBtn = document.createElement("button");
        delBtn.className = "icon-btn";
        delBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;
        delBtn.onclick = function() {
          entryToDelete = element.id;
          document.getElementById("deleteModal").classList.add("active");
        };

        actionsDiv.appendChild(editBtn);
        actionsDiv.appendChild(delBtn);
        headerRow.appendChild(actionsDiv);

        card.appendChild(headerRow);

        // Details
        const webRow = document.createElement("div");
        webRow.className = "entry-detail";
        webRow.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg> ${element.encryptedWebsite}`;
        card.appendChild(webRow);

        const userRow = document.createElement("div");
        userRow.className = "entry-detail";
        userRow.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> ${element.encryptedWebsiteUsername}`;
        card.appendChild(userRow);

        if (element.encryptedDescription) {
          const descRow = document.createElement("div");
          descRow.className = "entry-desc";
          descRow.textContent = element.encryptedDescription;
          card.appendChild(descRow);
        }

        const passRow = document.createElement("div");
        passRow.className = "password-wrap";
        
        const pwdInput = document.createElement("input");
        pwdInput.type = "password";
        pwdInput.value = element.encryptedWebsitePassword;
        pwdInput.readOnly = true;
        
        const toggleBtn = document.createElement("button");
        toggleBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
        toggleBtn.onclick = () => {
          if (pwdInput.type === "password") {
            pwdInput.type = "text";
            toggleBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
          } else {
            pwdInput.type = "password";
            toggleBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
          }
        };

        passRow.appendChild(pwdInput);
        passRow.appendChild(toggleBtn);
        card.appendChild(passRow);

        vaultList.appendChild(card);
      });
    }

    document.getElementById("searchInput").addEventListener("input", renderGrid);

    // Editing / Adding
    document.getElementById("addEntryBtn").onclick = () => {
      document.getElementById("modalTitle").textContent = "Add New Entry";
      document.getElementById("editName").value = "";
      document.getElementById("editWebsite").value = "";
      document.getElementById("editUsername").value = "";
      document.getElementById("editPassword").value = "";
      document.getElementById("editDescription").value = "";
      currentEditId = null;
      document.getElementById("editModal").classList.add("active");
    };

    document.getElementById("cancelButton").onclick = function () {
      document.getElementById("editModal").classList.remove("active");
    };

    document.getElementById("saveButton").onclick = async function () {
      const entry = {
        id: currentEditId,
        encryptedName: document.getElementById("editName").value,
        encryptedWebsite: document.getElementById("editWebsite").value,
        encryptedWebsiteUsername: document.getElementById("editUsername").value,
        encryptedWebsitePassword: document.getElementById("editPassword").value,
        encryptedDescription: document.getElementById("editDescription").value
      };
      // Original logic preserved
      const success = await updateVaultEntry(entry);
      if (success !== null) {
        document.getElementById("editModal").classList.remove("active");
        window.location.reload();
      }
    };

    // Deleting
    document.getElementById("cancelDeleteBtn").onclick = () => document.getElementById("deleteModal").classList.remove("active");
    
    document.getElementById("confirmDeleteBtn").onclick = async () => {
      if (entryToDelete) {
        const success = await deleteVaultEntry(entryToDelete);
        if (success) {
          window.location.reload();
        }
      }
    };

    // Logout
    document.getElementById("logoutBtn").onclick = () => {
      // TODO: clear sessionStorage and redirect to index.html
      // sessionStorage.clear();
      window.location.href = "/index.html";
    };

    // Account Modal
    document.getElementById("accountBtn").onclick = () => document.getElementById("accountModal").classList.add("active");
    document.getElementById("cancelAccountBtn").onclick = () => document.getElementById("accountModal").classList.remove("active");
    document.getElementById("saveAccountBtn").onclick = () => {
      // TODO: implement save settings
      document.getElementById("accountModal").classList.remove("active");
    };

    // Password Generator
    document.getElementById("generatePasswordBtn").onclick = () => {
      const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+~`|}{[]:;?><,./-=";
      let pwd = "";
      for (let i = 0; i < 16; i++) {
        pwd += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      document.getElementById("editPassword").value = pwd;
    };
  </script>
</body>
</html>
