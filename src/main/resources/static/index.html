<!DOCTYPE html>
<html>
<head>
  <title>Vault</title>
  <script src="auth.js"></script>
  <script src="api.js"></script>
  <script src="crypto.js"></script>
  <style>
    :root {
      --bg-color: #0f172a;
      --surface-color: #1e1b4b;
      --surface-hover: #2e1065;
      --text-primary: #f8fafc;
      --text-secondary: #c4b5fd;
      --accent-primary: #8b5cf6;
      --accent-hover: #7c3aed;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #10b981;
      --border-color: rgba(139, 92, 246, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    body {
      background: linear-gradient(135deg, var(--bg-color), #09090b);
      color: var(--text-primary);
      min-height: 100vh;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===================== LOGIN VIEW ===================== */
    #loginView {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: rgba(30, 27, 75, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      animation: fadeIn 0.6s ease-out;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 2rem;
      text-align: center;
      color: #fff;
    }

    .input-group {
      margin-bottom: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-group label {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    input, textarea {
      width: 100%;
      padding: 0.8rem 1rem;
      background-color: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1rem;
      transition: all 0.2s;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.3);
    }

    button {
      width: 100%;
      padding: 0.8rem 1rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: linear-gradient(to right, var(--accent-primary), #6d28d9);
      color: #ffffff;
      margin-top: 1rem;
    }

    .btn-primary:hover {
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.5);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background: var(--surface-hover);
      color: #fff;
    }

    .alert {
      padding: 0.8rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
      display: none;
      text-align: center;
      background-color: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .alert-success {
      background-color: rgba(16, 185, 129, 0.15);
      color: #6ee7b7;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    /* ===================== VAULT VIEW ===================== */
    #vaultView {
      display: none;
      flex-direction: column;
      min-height: 100vh;
    }

    #vaultView.active {
      display: flex;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2rem;
      background-color: rgba(30, 27, 75, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
    }

    .nav-actions {
      display: flex;
      gap: 1rem;
    }

    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      width: auto;
    }

    .icon-btn:hover {
      background-color: var(--surface-hover);
      color: #fff;
    }

    .input-field {
      width: 100%;
      padding: 0.8rem 1rem;
      background-color: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1rem;
      transition: all 0.2s;
      outline: none;
    }

    .input-field:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.3);
    }

    .btn {
      padding: 0.8rem 1.25rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
      margin-top: 0;
    }

    .btn-danger:hover {
      background: var(--danger-hover);
      box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
    }

    .vault-container {
      flex: 1;
      padding: 2.5rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .vault-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .search-bar {
      position: relative;
      flex: 1;
      max-width: 500px;
    }

    .search-bar svg {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
    }

    .search-bar input {
      padding-left: 2.8rem;
    }

    .vault-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    .entry-card {
      background: rgba(30, 27, 75, 0.5);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.5rem;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeIn 0.4s ease-out;
      display: flex;
      flex-direction: column;
    }

    .entry-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      background: rgba(30, 27, 75, 0.8);
    }

    .entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      border-bottom: 1px solid rgba(139, 92, 246, 0.1);
      padding-bottom: 0.75rem;
      gap: 0.25rem;
    }

    .entry-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #fff;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 200px;
    }

    .entry-actions {
      display: flex;
      gap: 0.25rem;
    }

    .entry-detail {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .entry-detail svg {
      flex-shrink: 0;
    }

    .entry-detail span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: calc(100% - 30px);
    }

    .password-wrap {
      display: flex;
      align-items: left;
      background: rgba(15, 23, 42, 0.5);
      padding: 0.5rem;
      border-radius: 6px;
      border: 1px solid rgba(139, 92, 246, 0.2);
      margin-top: auto;
    }

    .password-wrap input {
        background: transparent;
        border: none;
        color: var(--text-primary);
        width: 100%;
        font-family: monospace;
        font-size: 1rem;
        outline: none;
        padding: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .password-wrap button {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0.2rem;
      width: auto;
      margin-top: 0;
    }

    .entry-desc {
      font-size: 0.875rem;
      color: rgba(196, 181, 253, 0.7);
      margin-bottom: 1rem;
      line-height: 1.5;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ===================== MODALS ===================== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-container {
      background: #1e1b4b;
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 450px;
      transform: scale(0.95);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
    }

    .modal-overlay.active .modal-container {
      transform: scale(1);
    }

    .password-generator-row {
      display: flex;
      gap: 0.5rem;
    }

    .modal-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .modal-actions .btn {
      flex: 1;
    }

    .modal-actions button {
      margin-top: 0;
    }
  </style>
</head>
<body>

  <!-- ===================== LOGIN VIEW ===================== -->
  <div id="loginView">
    <div class="card">
      <div style="text-align: center; margin-bottom: 1.5rem; color: var(--accent-primary);">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          <path d="m9 12 2 2 4-4"></path>
        </svg>
      </div>
      <h1>Login</h1>

      <div id="errorMessage" class="alert">Invalid username or password</div>

      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Username" />
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password" />
      </div>

      <button id="loginButton" class="btn-primary" type="button">Login</button>
    </div>
  </div>

  <!-- ===================== VAULT VIEW ===================== -->
  <div id="vaultView">
    <nav class="navbar">
      <div class="nav-brand">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        Vault
      </div>
      <div class="nav-actions">
        <button id="syncBtn" class="icon-btn" title="Sync">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
        </button>
        <button id="accountBtn" class="icon-btn" title="Account Settings">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="7" r="4"></circle>
            <path d="M5.5 21a8.38 8.38 0 0 1 13 0"></path>
          </svg>
        </button>
        <button id="logoutBtn" class="icon-btn" title="Logout">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </nav>

    <main class="vault-container">
      <div class="vault-header">
        <div class="search-bar">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="searchInput" class="input-field" placeholder="Search entries...">
        </div>
        <button id="addEntryBtn" class="btn btn-primary" style="width: auto; margin-top: 0;">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Add Entry
        </button>
      </div>
      <div id="vaultList" class="vault-grid"></div>
    </main>
  </div>

  <!-- ===================== MODALS ===================== -->

  <!-- Add/Edit Entry Modal -->
  <div id="editModal" class="modal-overlay">
    <div class="modal-container">
      <h2 id="modalTitle" style="margin-bottom: 1.5rem; color: #fff;">Edit Entry</h2>
      <div class="input-group">
        <label for="editName">Name</label>
        <input type="text" id="editName" class="input-field" placeholder="e.g. My Bank">
      </div>
      <div class="input-group">
        <label for="editWebsite">Website</label>
        <input type="text" id="editWebsite" class="input-field" placeholder="https://">
      </div>
      <div class="input-group">
        <label for="editUsername">Username</label>
        <input type="text" id="editUsername" class="input-field" placeholder="Username">
      </div>
      <div class="input-group">
        <label for="editEmail">Email</label>
        <input type="text" id="editEmail" class="input-field" placeholder="Email">
      </div>
      <div class="input-group">
        <label for="editPassword">Password</label>
        <div class="password-generator-row">
          <input type="password" id="editPassword" class="input-field" placeholder="Password">
          <button type="button" id="togglePasswordVisibility" class="btn-secondary" style="padding: 0 0.75rem; border-radius: 8px; width: auto; margin-top: 0;" title="Show / Hide">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
          <button type="button" id="generatePasswordBtn" class="btn-secondary" style="padding: 0 1rem; border-radius: 8px; width: auto; margin-top: 0;" title="Generate">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
            </svg>
          </button>
        </div>
      </div>
      <div class="input-group">
        <label for="editDescription">Description / Notes</label>
        <textarea id="editDescription" class="input-field" rows="3" placeholder="Notes..."></textarea>
      </div>
      <div class="modal-actions">
        <button id="cancelButton" class="btn btn-secondary">Cancel</button>
        <button id="saveButton" class="btn btn-primary" style="margin-top: 0;">Save</button>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div id="deleteModal" class="modal-overlay">
    <div class="modal-container" style="text-align: center; max-width: 400px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem;">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
        <line x1="12" y1="9" x2="12" y2="13"></line>
        <line x1="12" y1="17" x2="12.01" y2="17"></line>
      </svg>
      <h2 style="color: #fff; margin-bottom: 0.5rem;">Delete Entry</h2>
      <p style="color: var(--text-secondary); margin-bottom: 2rem;">Are you sure you want to permanently delete this entry? This action cannot be undone.</p>
      <div class="modal-actions">
        <button id="cancelDeleteBtn" class="btn btn-secondary">Keep It</button>
        <button id="confirmDeleteBtn" class="btn btn-danger">Yes, Delete</button>
      </div>
    </div>
  </div>

  <!-- Account Modal -->
  <div id="accountModal" class="modal-overlay">
    <div class="modal-container">
      <h2 style="color: #fff; margin-bottom: 1.5rem;">Account Settings</h2>
      <p style="color: var(--text-secondary); text-align: center; margin-bottom: 1.5rem;">Update your master password.</p>
      <div class="input-group">
        <label>Current Password</label>
        <input type="password" id="acctCurrent" class="input-field" placeholder="Current">
      </div>
      <div class="input-group">
        <label>New Password</label>
        <input type="password" id="acctNew" class="input-field" placeholder="New">
      </div>
      <div class="input-group">
        <label>Confirm Password</label>
        <input type="password" id="acctConfirm" class="input-field" placeholder="Confirm">
      </div>
      <div class="modal-actions">
        <button id="cancelAccountBtn" class="btn btn-secondary">Cancel</button>
        <button id="saveAccountBtn" class="btn btn-primary" style="margin-top: 0;">Save Changes</button>
      </div>
    </div>
  </div>

  <script>
    let globalVaultEntries = [];
    let currentEditId = null;
    let entryToDelete = null;
    let encryptionKey = null;

    // Copy to clipboard helper
    async function copyField(text, btn) {
        if (!text) return;
        try {
            await navigator.clipboard.writeText(text);
            const original = btn.innerHTML;
            btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            setTimeout(() => { btn.innerHTML = original; }, 1500);
        } catch (err) {
            console.error('Failed to copy', err);
        }
    }

    function showView(viewName) {
      document.getElementById("loginView").style.display = viewName === "login" ? "flex" : "none";
      const vaultView = document.getElementById("vaultView");
      if (viewName === "vault") {
        vaultView.classList.add("active");
      } else {
        vaultView.classList.remove("active");
      }
    }

    ["editName", "editWebsite", "editUsername", "editEmail", "editPassword", "editDescription"].forEach(id => {
        document.getElementById(id).addEventListener("input", checkModalFields);
    });

    function checkModalFields() {
      const allNotFilled =
        !document.getElementById("editName").value &&
        !document.getElementById("editWebsite").value &&
        !document.getElementById("editUsername").value &&
        !document.getElementById("editEmail").value &&
        !document.getElementById("editPassword").value &&
        !document.getElementById("editDescription").value;

      document.getElementById("saveButton").disabled = allNotFilled;
    }

    async function loadVault() {
      const vaultEntries = await getVaultEntries();
      globalVaultEntries = vaultEntries;
      renderGrid();
    }

    window.onload = function () {
      sessionStorage.clear();
      showView("login");
    };

    // --- Login ---
    document.getElementById("loginButton").onclick = async function () {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      document.getElementById("errorMessage").style.display = "none";
      const data = await authenticate("/api/auth/login", username, password);

      if (data === null) {
        document.getElementById("errorMessage").style.display = "block";
      } else {
        sessionStorage.setItem("token", data.token);
        sessionStorage.setItem("salt", data.salt);

        encryptionKey = await deriveKey(password, data.salt);

        showView("vault");
        await loadVault();
      }
    };

    document.addEventListener("keydown", function(event) {
      if (event.key === "Enter" && document.getElementById("loginView").style.display !== "none") {
        document.getElementById("loginButton").click();
      }
    });

    // --- Logout ---
    document.getElementById("logoutBtn").onclick = () => {
      sessionStorage.clear();
      encryptionKey = null;
      globalVaultEntries = [];
      document.getElementById("searchInput").value = '';
      document.getElementById("vaultList").innerHTML = '';
      document.getElementById("username").value = '';
      document.getElementById("password").value = '';
      window.location.reload();
    };

    // --- Sync ---
    document.getElementById("syncBtn").onclick = async () => {
      await loadVault();
    };

    // -- Render Grid --
    async function renderGrid() {
    const vaultList = document.getElementById("vaultList");
    vaultList.innerHTML = '';

    const safeDecrypt = async (val) => {
      if (!val) return '';
      return await decryptFromString(encryptionKey, val);
    };

    const decryptedEntries = await Promise.all(
      globalVaultEntries.map(async entry => ({
        ...entry,
        encryptedName: await safeDecrypt(entry.encryptedName),
        encryptedWebsite: await safeDecrypt(entry.encryptedWebsite),
        encryptedWebsiteUsername: await safeDecrypt(entry.encryptedWebsiteUsername),
        encryptedWebsiteEmail: await safeDecrypt(entry.encryptedWebsiteEmail),
        encryptedWebsitePassword: await safeDecrypt(entry.encryptedWebsitePassword),
        encryptedDescription: await safeDecrypt(entry.encryptedDescription)
      }))
    );

    const query = document.getElementById("searchInput").value.toLowerCase();

    decryptedEntries.forEach((element) => {
      if (query && !element.encryptedName.toLowerCase().includes(query) &&
          !element.encryptedWebsite.toLowerCase().includes(query) &&
          !element.encryptedWebsiteEmail.toLowerCase().includes(query)) {
        return;
      }

      const card = document.createElement("div");
      card.className = "entry-card";

      // ── Header row (title + copy title + edit + delete) ──
      const headerRow = document.createElement("div");
      headerRow.className = "entry-header";

      const titleText = document.createElement("div");
      titleText.className = "entry-title";
      titleText.textContent = element.encryptedName;

      const titleCopyBtn = document.createElement("button");
      titleCopyBtn.className = "icon-btn";
      titleCopyBtn.title = "Copy Name";
      titleCopyBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
      titleCopyBtn.onclick = (e) => { e.stopPropagation(); copyField(element.encryptedName, titleCopyBtn); };
      
      const actionsDiv = document.createElement("div");
      actionsDiv.className = "entry-actions";

      const editBtn = document.createElement("button");
      editBtn.className = "icon-btn";
      editBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`;
      editBtn.onclick = function () {
        document.getElementById("modalTitle").textContent = "Edit Entry";
        document.getElementById("editName").value = element.encryptedName;
        document.getElementById("editWebsite").value = element.encryptedWebsite;
        document.getElementById("editUsername").value = element.encryptedWebsiteUsername;
        document.getElementById("editEmail").value = element.encryptedWebsiteEmail;
        document.getElementById("editPassword").value = element.encryptedWebsitePassword;
        document.getElementById("editPassword").type = "password";
        resetPasswordToggle();
        document.getElementById("editDescription").value = element.encryptedDescription || '';
        currentEditId = element.id;
        document.getElementById("editModal").classList.add("active");
        checkModalFields();
      };

      const delBtn = document.createElement("button");
      delBtn.className = "icon-btn";
      delBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;
      delBtn.onclick = function () {
        entryToDelete = element.id;
        document.getElementById("deleteModal").classList.add("active");
      };

      actionsDiv.appendChild(titleCopyBtn);
      actionsDiv.appendChild(editBtn);
      actionsDiv.appendChild(delBtn);

      headerRow.appendChild(titleText);
      headerRow.appendChild(actionsDiv);
      card.appendChild(headerRow);

      // ── Website row ──
      const webRow = document.createElement("div");
      webRow.className = "entry-detail";
      webRow.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg><span>${element.encryptedWebsite || ''}</span>`;
      if (element.encryptedWebsite) {
        const webCopyBtn = document.createElement("button");
        webCopyBtn.className = "icon-btn";
        webCopyBtn.style.marginLeft = "auto";
        webCopyBtn.title = "Copy Website";
        webCopyBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
        webCopyBtn.onclick = (e) => { e.stopPropagation(); copyField(element.encryptedWebsite, webCopyBtn); };
        webRow.appendChild(webCopyBtn);
      }
      card.appendChild(webRow);

      // ── Username row ──
      const userRow = document.createElement("div");
      userRow.className = "entry-detail";
      userRow.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span>${element.encryptedWebsiteUsername || ''}</span>`;
      if (element.encryptedWebsiteUsername) {
        const userCopyBtn = document.createElement("button");
        userCopyBtn.className = "icon-btn";
        userCopyBtn.style.marginLeft = "auto";
        userCopyBtn.title = "Copy Username";
        userCopyBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
        userCopyBtn.onclick = (e) => { e.stopPropagation(); copyField(element.encryptedWebsiteUsername, userCopyBtn); };
        userRow.appendChild(userCopyBtn);
      }
      card.appendChild(userRow);

      // ── Email row ──
      if (element.encryptedWebsiteEmail) {
        const emailRow = document.createElement("div");
        emailRow.className = "entry-detail";
        emailRow.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg><span>${element.encryptedWebsiteEmail}</span>`;
        const emailCopyBtn = document.createElement("button");
        emailCopyBtn.className = "icon-btn";
        emailCopyBtn.style.marginLeft = "auto";
        emailCopyBtn.title = "Copy Email";
        emailCopyBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
        emailCopyBtn.onclick = (e) => { e.stopPropagation(); copyField(element.encryptedWebsiteEmail, emailCopyBtn); };
        emailRow.appendChild(emailCopyBtn);
        card.appendChild(emailRow);
      }

      // ── Description ──
      if (element.encryptedDescription) {
        const descRow = document.createElement("div");
        descRow.className = "entry-desc";
        descRow.textContent = element.encryptedDescription;
        card.appendChild(descRow);
      }

      // ── Password row ──
      const passRow = document.createElement("div");
      passRow.className = "password-wrap";

      const pwdInput = document.createElement("input");
      pwdInput.type = "password";
      pwdInput.value = "••••••••••••••••••••";
      pwdInput.readOnly = true;

      const toggleBtn = document.createElement("button");
      toggleBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
      toggleBtn.onclick = () => {
        if (pwdInput.type === "password") {
          pwdInput.type = "text";
          pwdInput.value = element.encryptedWebsitePassword;
          toggleBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
        } else {
          pwdInput.type = "password";
          pwdInput.value = "••••••••••••••••••••";
          toggleBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
        }
      };

      const copyBtn = document.createElement("button");
      copyBtn.title = "Copy Password";
      copyBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
      copyBtn.onclick = async () => { copyField(element.encryptedWebsitePassword, copyBtn); };

      passRow.appendChild(pwdInput);
      passRow.appendChild(copyBtn);
      passRow.appendChild(toggleBtn);
      card.appendChild(passRow);
      vaultList.appendChild(card);
    });
  }

    document.getElementById("searchInput").addEventListener("input", renderGrid);

    // --- Add / Edit ---
    document.getElementById("addEntryBtn").onclick = () => {
      document.getElementById("modalTitle").textContent = "Add New Entry";
      document.getElementById("editName").value = "";
      document.getElementById("editWebsite").value = "";
      document.getElementById("editUsername").value = "";
      document.getElementById("editEmail").value = "";
      document.getElementById("editPassword").value = "";
      document.getElementById("editPassword").type = "password";
      resetPasswordToggle();
      document.getElementById("editDescription").value = "";
      currentEditId = null;
      document.getElementById("editModal").classList.add("active");
      checkModalFields();
    };

    document.getElementById("cancelButton").onclick = () => {
      document.getElementById("editModal").classList.remove("active");
    };

    document.getElementById("saveButton").onclick = async function () {
      const entry = {
        id: currentEditId,
        encryptedName: await encryptToString(encryptionKey, document.getElementById("editName").value),
        encryptedWebsite: await encryptToString(encryptionKey, document.getElementById("editWebsite").value),
        encryptedWebsiteUsername: await encryptToString(encryptionKey, document.getElementById("editUsername").value),
        encryptedWebsiteEmail: await encryptToString(encryptionKey, document.getElementById("editEmail").value),
        encryptedWebsitePassword: await encryptToString(encryptionKey, document.getElementById("editPassword").value),
        encryptedDescription: await encryptToString(encryptionKey, document.getElementById("editDescription").value),
      };

      let success = null;
      if (document.getElementById("modalTitle").textContent === "Add New Entry") {
        success = await createVaultEntry(entry);
      } else if (document.getElementById("modalTitle").textContent === "Edit Entry") {
        success = await updateVaultEntry(entry);
      }

      if (success !== null) {
        document.getElementById("editModal").classList.remove("active");
        await loadVault();
      }
    };

    // --- Delete ---
    document.getElementById("cancelDeleteBtn").onclick = () => document.getElementById("deleteModal").classList.remove("active");

    document.getElementById("confirmDeleteBtn").onclick = async () => {
      if (entryToDelete) {
        const success = await deleteVaultEntry(entryToDelete);
        if (success) {
          document.getElementById("deleteModal").classList.remove("active");
          await loadVault();
        }
      }
    };

    // --- Account Modal ---
    document.getElementById("accountBtn").onclick = () => {
      document.getElementById("acctCurrent").value = '';
      document.getElementById("acctNew").value = '';
      document.getElementById("acctConfirm").value = '';
      document.getElementById("accountModal").classList.add("active");
    };

    document.getElementById("cancelAccountBtn").onclick = () => {
      document.getElementById("acctCurrent").value = '';
      document.getElementById("acctNew").value = '';
      document.getElementById("acctConfirm").value = '';
      document.getElementById("accountModal").classList.remove("active");
    };

    document.getElementById("saveAccountBtn").onclick = async () => {
      const currentPassword = document.getElementById("acctCurrent").value;
      const newPassword = document.getElementById("acctNew").value;
      const confirmPassword = document.getElementById("acctConfirm").value;

      if (!currentPassword || !newPassword || !confirmPassword) {
          return;
      }

      if (newPassword !== confirmPassword) {
          return;
      }

      // Derive old key to re-encrypt entries
      const oldSalt = sessionStorage.getItem("salt");
      const oldKey = await deriveKey(currentPassword, oldSalt);

      // Generate new salt and derive new key
      const newSalt = generateSalt();
      const newKey = await deriveKey(newPassword, newSalt);

      // Re-encrypt all vault entries with new key
      const reEncryptedEntries = await Promise.all(
        globalVaultEntries.map(async entry => {
            const decryptedName = entry.encryptedName
                ? await decryptFromString(oldKey, entry.encryptedName) : null;
            const decryptedWebsite = entry.encryptedWebsite
                ? await decryptFromString(oldKey, entry.encryptedWebsite) : null;
            const decryptedUsername = entry.encryptedWebsiteUsername
                ? await decryptFromString(oldKey, entry.encryptedWebsiteUsername) : null;
            const decryptedEmail = entry.encryptedWebsiteEmail
                ? await decryptFromString(oldKey, entry.encryptedWebsiteEmail) : null;
            const decryptedPassword = entry.encryptedWebsitePassword
                ? await decryptFromString(oldKey, entry.encryptedWebsitePassword) : null;
            const decryptedDescription = entry.encryptedDescription
                ? await decryptFromString(oldKey, entry.encryptedDescription) : null;

            return {
                id: entry.id,
                encryptedName: decryptedName
                    ? await encryptToString(newKey, decryptedName) : null,
                encryptedWebsite: decryptedWebsite
                    ? await encryptToString(newKey, decryptedWebsite) : null,
                encryptedWebsiteUsername: decryptedUsername
                    ? await encryptToString(newKey, decryptedUsername) : null,
                encryptedWebsiteEmail: decryptedEmail
                  ? await encryptToString(newKey, decryptedEmail) : null,
                encryptedWebsitePassword: decryptedPassword
                    ? await encryptToString(newKey, decryptedPassword) : null,
                encryptedDescription: decryptedDescription
                    ? await encryptToString(newKey, decryptedDescription) : null
            };
        })
    );

      // Call API
      const response = await changePassword(currentPassword, newPassword, newSalt, reEncryptedEntries);

      if (response !== null) {
          // Update session with new token, salt, and key
          sessionStorage.setItem("token", response.token);
          sessionStorage.setItem("salt", newSalt);
          encryptionKey = newKey;
          globalVaultEntries = response.entries;
          document.getElementById("accountModal").classList.remove("active");
          await renderGrid();
      }
  };

    // --- Password Visibility Toggle (modal) ---
    document.getElementById("togglePasswordVisibility").onclick = () => {
      const pwdInput = document.getElementById("editPassword");
      const btn = document.getElementById("togglePasswordVisibility");
      if (pwdInput.type === "password") {
        pwdInput.type = "text";
        btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
      } else {
        pwdInput.type = "password";
        btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
      }
    };

    function resetPasswordToggle() {
      document.getElementById("editPassword").type = "password";
      document.getElementById("togglePasswordVisibility").innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
    }

    // --- Password Generator ---
    document.getElementById("generatePasswordBtn").onclick = () => {
      const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+~`|}{[]:;?><,./-=";
      let pwd = "";
      for (let i = 0; i < 16; i++) {
        pwd += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      document.getElementById("editPassword").value = pwd;
      checkModalFields();
    };
  </script>
