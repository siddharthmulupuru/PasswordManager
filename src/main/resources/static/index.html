<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <script src="auth.js"></script>
  <style>
    :root {
      --bg-color: #0f172a; /* Dark slate blue */
      --surface-color: #1e1b4b; /* Very dark purple */
      --surface-hover: #2e1065;
      --text-primary: #f8fafc;
      --text-secondary: #c4b5fd;
      --accent-primary: #8b5cf6; /* Vibrant purple */
      --accent-hover: #7c3aed;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #10b981;
      --border-color: rgba(139, 92, 246, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background: linear-gradient(135deg, var(--bg-color), #09090b);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: rgba(30, 27, 75, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      animation: fadeIn 0.6s ease-out;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 2rem;
      text-align: center;
      color: #fff;
    }

    .input-group {
      margin-bottom: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-group label {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    input {
      width: 100%;
      padding: 0.8rem 1rem;
      background-color: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1rem;
      transition: all 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.3);
    }

    button {
      width: 100%;
      padding: 0.8rem 1rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: linear-gradient(to right, var(--accent-primary), #6d28d9);
      color: #ffffff;
      margin-top: 1rem;
    }

    .btn-primary:hover {
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.5);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background: var(--surface-hover);
      color: #fff;
    }

    .link-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 0.875rem;
      cursor: pointer;
      text-decoration: none;
      margin-top: 1.5rem;
      padding: 0;
      font-weight: 400;
    }

    .link-btn:hover {
      color: var(--accent-primary);
      text-decoration: underline;
    }

    .alert {
      padding: 0.8rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
      display: none;
      text-align: center;
      background-color: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .alert-success {
      background-color: rgba(16, 185, 129, 0.15);
      color: #6ee7b7;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-container {
      transform: scale(0.95);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .modal-overlay.active .modal-container {
      transform: scale(1);
    }

    .modal-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  
  <div class="card">
    <div style="text-align: center; margin-bottom: 1.5rem; color: var(--accent-primary);">
      <!-- Shield logo -->
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        <path d="m9 12 2 2 4-4"></path>
      </svg>
    </div>
    <h1>Login</h1>
    
    <div id="errorMessage" class="alert">Invalid username or password</div>

    <div class="input-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Username" />
    </div>
    
    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Password" />
    </div>
    
    <button id="loginButton" class="btn-primary" type="button">Login</button>
    <button id="openChangePasswordBtn" class="link-btn" type="button">Change Password</button>
  </div>

  <!-- Change Password Modal -->
  <div id="changePasswordModal" class="modal-overlay">
    <div class="card modal-container">
      <h1 style="margin-bottom: 1.5rem;">Change Password</h1>
      
      <div id="changePwdErrorMsg" class="alert">Error changing password</div>
      <div id="changePwdSuccessMsg" class="alert alert-success">Password changed successfully</div>

      <div class="input-group">
        <label for="currentPassword">Current Password</label>
        <input type="password" id="currentPassword" placeholder="Current password">
      </div>
      
      <div class="input-group">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" placeholder="New password">
      </div>
      
      <div class="input-group">
        <label for="confirmNewPassword">Confirm New Password</label>
        <input type="password" id="confirmNewPassword" placeholder="Confirm new password">
      </div>

      <div class="modal-actions">
        <button type="button" id="cancelChangePwdBtn" class="btn-secondary">Cancel</button>
        <button type="button" id="saveChangePwdBtn" class="btn-primary" style="margin-top: 0;">Save Changes</button>
      </div>
    </div>
  </div>

  <script>
    // --- Existing Login Logic ---
    document.getElementById("loginButton").onclick = async function () {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      document.getElementById("errorMessage").style.display = "none";
      const url = "/api/auth/login";
      const token = await authenticate(url, username, password);

      // If status is not good, then display the error
      if (token === null) {
        document.getElementById("errorMessage").style.display = "block";
      } else {
        sessionStorage.setItem("token", token);
        window.location.href = "/vault.html";
      }
    };

    // --- Modal Toggles ---
    const changePasswordModal = document.getElementById("changePasswordModal");
    
    document.getElementById("openChangePasswordBtn").onclick = () => {
      document.getElementById("currentPassword").value = '';
      document.getElementById("newPassword").value = '';
      document.getElementById("confirmNewPassword").value = '';
      document.getElementById("changePwdErrorMsg").style.display = 'none';
      document.getElementById("changePwdSuccessMsg").style.display = 'none';
      changePasswordModal.classList.add("active");
    };

    document.getElementById("cancelChangePwdBtn").onclick = () => {
      changePasswordModal.classList.remove("active");
    };

    // --- New Change Password Logic ---
    document.getElementById("saveChangePwdBtn").onclick = async function() {
      const currentPwd = document.getElementById("currentPassword").value;
      const newPwd = document.getElementById("newPassword").value;
      const confirmPwd = document.getElementById("confirmNewPassword").value;
      
      const errorMsg = document.getElementById("changePwdErrorMsg");
      const successMsg = document.getElementById("changePwdSuccessMsg");
      
      errorMsg.style.display = "none";
      successMsg.style.display = "none";

      if (!currentPwd || !newPwd || !confirmPwd) {
        errorMsg.textContent = "Please fill in all fields.";
        errorMsg.style.display = "block";
        return;
      }

      if (newPwd !== confirmPwd) {
        errorMsg.textContent = "New passwords do not match.";
        errorMsg.style.display = "block";
        return;
      }

      // TODO: client-side encryption goes here (if needed for password change)
      // TODO: call change password API endpoint

    };
  </script>
</body>
</html>
